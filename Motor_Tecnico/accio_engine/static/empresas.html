<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seleccionar empresa — EMAccion</title>
  <link rel="icon" href="/accio/static/em-logomark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/accio/static/accio-design.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card empresas-card" aria-labelledby="empresasTitle">
      <header class="login-card-head">
        <div class="login-brand em-logo">
          <span class="em-logo-icon" aria-hidden="true">
            <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g class="em-gear-ring" stroke="currentColor" fill="none">
                <circle cx="18" cy="18" r="14" stroke-width="1.5" stroke-dasharray="2.4 1.9"/>
              </g>
            </svg>
          </span>
          <span class="em-wordmark">EMAccion</span>
        </div>
      </header>
      <h1 class="login-title" id="empresasTitle">Seleccione empresa</h1>
      <p class="login-subtitle" id="empresasSubtitle">Elija la organización con la que desea trabajar.</p>
      <ul class="empresa-picker-list" id="empresaList"></ul>
      <footer class="login-foot">
        <button type="button" class="btn-ghost" id="logoutBtn">Cerrar sesión</button>
      </footer>
    </section>
  </main>
  <script>
    async function loadCompanies() {
      const r = await fetch('/accio/auth/empresas', { credentials: 'include' });
      const data = await r.json();
      if (!data.authenticated) {
        location.href = '/accio/login/';
        return;
      }
      const list = document.getElementById('empresaList');
      const companies = data.companies || [];
      if (!companies.length) {
        list.innerHTML = '<li class="empresa-picker-empty">No tiene empresas asignadas.</li>';
        return;
      }
      if (companies.length === 1) {
        enterEmpresa(companies[0].id);
        return;
      }
      document.getElementById('empresasSubtitle').textContent =
        `${data.name || 'Usuario'} — ${companies.length} empresas disponibles`;
      list.innerHTML = companies.map(c => `
        <li>
          <button type="button" class="empresa-picker-item" data-id="${c.id}">
            <span class="empresa-picker-name">${c.name}</span>
            <span class="empresa-picker-meta">${c.crm_label || ''}</span>
          </button>
        </li>`).join('');
      list.querySelectorAll('.empresa-picker-item').forEach(btn => {
        btn.addEventListener('click', () => enterEmpresa(btn.dataset.id));
      });
    }

    async function enterEmpresa(id) {
      const r = await fetch('/accio/auth/empresas/' + encodeURIComponent(id) + '/entrar', {
        method: 'POST',
        credentials: 'include',
      });
      const data = await r.json();
      if (!r.ok) {
        alert(data.error || 'No se pudo entrar');
        return;
      }
      location.href = data.redirect || ('/accio/dashboard/' + id + '/');
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/accio/auth/logout', { method: 'POST', credentials: 'include' });
      location.href = '/accio/login/';
    });

    loadCompanies();
  </script>
</body>
</html>
