<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EM+Acción — Analítica</title>
  <link rel="stylesheet" href="/accio/static/accio-design.css">
  <link rel="stylesheet" href="/accio/producto/previews/previews.css">
</head>
<body class="preview-page">
  <div class="preview-shell">
    <div class="preview-topbar"><span class="preview-brand">Analítica</span><span class="preview-pill">Últimos 30 días</span></div>
    <div class="preview-body">
      <div class="preview-kpis">
        <div class="preview-kpi"><div class="preview-kpi-label">Alcance</div><div class="preview-kpi-value">24.8K</div></div>
        <div class="preview-kpi"><div class="preview-kpi-label">Interacciones</div><div class="preview-kpi-value">1.2K</div></div>
        <div class="preview-kpi"><div class="preview-kpi-label">Leads</div><div class="preview-kpi-value">186</div></div>
        <div class="preview-kpi"><div class="preview-kpi-label">Conversión</div><div class="preview-kpi-value">3.2%</div></div>
      </div>
      <div class="preview-card preview-full">
        <div class="preview-card-head">Tendencia de resultados</div>
        <div class="preview-chart">
          <svg viewBox="0 0 400 80" preserveAspectRatio="none"><polyline fill="none" stroke="#1a4a2e" stroke-width="2.5" points="0,60 50,45 100,50 150,30 200,35 250,20 300,25 350,15 400,10"/></svg>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
