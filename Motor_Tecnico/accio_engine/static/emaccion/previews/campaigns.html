<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EM+Acción — Campañas</title>
  <link rel="stylesheet" href="/accio/static/accio-design.css">
  <link rel="stylesheet" href="/accio/producto/previews/previews.css">
</head>
<body class="preview-page">
  <div class="preview-shell">
    <div class="preview-topbar"><span class="preview-brand">Campañas comerciales</span><span class="preview-pill">App: EN1</span></div>
    <div class="preview-body">
      <div class="preview-kpis">
        <div class="preview-kpi"><div class="preview-kpi-label">Activas</div><div class="preview-kpi-value">6</div></div>
        <div class="preview-kpi"><div class="preview-kpi-label">Leads</div><div class="preview-kpi-value">42</div></div>
        <div class="preview-kpi"><div class="preview-kpi-label">Piezas</div><div class="preview-kpi-value">18</div></div>
        <div class="preview-kpi"><div class="preview-kpi-label">ROI</div><div class="preview-kpi-value">+28%</div></div>
      </div>
      <div class="preview-card preview-full">
        <div class="preview-card-head">Campañas por producto</div>
        <div class="preview-card-body">
          <div class="preview-row"><strong>Diagnóstico gratuito</strong><span class="preview-badge">Activa</span></div>
          <div class="preview-row"><strong>Demo plataformas</strong><span class="preview-badge is-pending">En curso</span></div>
          <div class="preview-row"><strong>Facturación electrónica</strong><span class="preview-badge is-draft">Planificada</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
