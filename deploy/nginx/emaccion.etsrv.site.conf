# EM+Acción — emaccion.etsrv.site
# Instalar: sudo cp deploy/nginx/emaccion.etsrv.site.conf /etc/nginx/sites-available/
#           sudo ln -sf /etc/nginx/sites-available/emaccion.etsrv.site.conf /etc/nginx/sites-enabled/
#           sudo certbot --nginx -d emaccion.etsrv.site
#           sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name emaccion.etsrv.site;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name emaccion.etsrv.site;

    # Tras certbot, rutas Let's Encrypt:
    ssl_certificate /etc/letsencrypt/live/emaccion.etsrv.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emaccion.etsrv.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    location /accio/ {
        proxy_pass http://127.0.0.1:8092/accio/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location / {
        return 302 /accio/dashboard/easytech/;
    }
}
